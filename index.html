<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Креативная карта Дагестана</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f9f7; height: 100vh; overflow: hidden; }
        .app { display: flex; height: 100vh; width: 100%; }

        .sidebar {
            width: 360px;
            min-width: 300px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            z-index: 20;
            overflow-y: auto;
            border-right: 1px solid rgba(184, 224, 210, 0.4);
            box-shadow: 2px 0 20px rgba(0,0,0,0.04);
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: #f0f5f2; }
        .sidebar::-webkit-scrollbar-thumb { background: #b8e0d2; border-radius: 10px; }

        .sidebar-header {
            background: linear-gradient(135deg, #e8f5f0, #d4ede4);
            padding: 1.8rem 1.5rem 1.4rem;
            border-bottom: 1px solid rgba(184,224,210,0.3);
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .sidebar-header h1 { font-size: 1.6rem; font-weight: 600; color: #1a3a2e; }
        .sidebar-header .sub { font-size: 0.8rem; color: #3a6b5a; margin-top: 6px; opacity: 0.8; }
        .sidebar-header .sub span {
            background: rgba(42,110,58,0.1);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #2a6e3a;
        }

        .objects-list { padding: 1rem 1.2rem; display: flex; flex-direction: column; gap: 8px; flex: 1; }

        .object-card {
            background: #fff;
            border-radius: 16px;
            padding: 10px 14px;
            cursor: pointer;
            border: 1px solid #eaf3ef;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .object-card:hover {
            background: #f3fbf8;
            border-left: 4px solid #7dc6b0;
            transform: translateX(3px);
        }
        .object-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 300;
            flex-shrink: 0;
        }
        .object-title { font-weight: 600; font-size: 0.9rem; color: #1a3a2e; }
        .object-category { font-size: 0.6rem; color: #5a8a78; background: #eaf5f0; padding: 1px 10px; border-radius: 20px; display: inline-block; margin-top: 3px; }

        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #e8efe9; }

        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 20px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            border: 1px solid rgba(184,224,210,0.3);
        }
        .custom-popup .leaflet-popup-content { margin: 0; width: 270px !important; }
        .custom-popup .leaflet-popup-tip { background: #fff; }

        .popup-img { width: 100%; height: 150px; object-fit: cover; display: block; background: #eaf5f0; }
        .popup-text { padding: 12px 16px 16px; }
        .popup-text h3 { font-size: 1rem; color: #1a4d2a; margin-bottom: 4px; }
        .popup-address { font-size: 0.75rem; color: #4a7a68; }
        .popup-badge { background: #eaf5f0; padding: 2px 12px; border-radius: 20px; font-size: 0.6rem; color: #2a7a5a; display: inline-block; margin-top: 8px; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .object-card { animation: fadeUp 0.3s ease forwards; opacity: 0; }
        .object-card:nth-child(1) { animation-delay: 0.02s; }
        .object-card:nth-child(2) { animation-delay: 0.04s; }
        .object-card:nth-child(3) { animation-delay: 0.06s; }
        .object-card:nth-child(4) { animation-delay: 0.08s; }
        .object-card:nth-child(5) { animation-delay: 0.10s; }
        .object-card:nth-child(6) { animation-delay: 0.12s; }
        .object-card:nth-child(7) { animation-delay: 0.14s; }
        .object-card:nth-child(8) { animation-delay: 0.16s; }
        .object-card:nth-child(9) { animation-delay: 0.18s; }
        .object-card:nth-child(10) { animation-delay: 0.20s; }
        .object-card:nth-child(11) { animation-delay: 0.22s; }
        .object-card:nth-child(12) { animation-delay: 0.24s; }
        .object-card:nth-child(13) { animation-delay: 0.26s; }
        .object-card:nth-child(14) { animation-delay: 0.28s; }
        .object-card:nth-child(15) { animation-delay: 0.30s; }
        .object-card:nth-child(16) { animation-delay: 0.32s; }
        .object-card:nth-child(17) { animation-delay: 0.34s; }
        .object-card:nth-child(18) { animation-delay: 0.36s; }

        .leaflet-control-zoom { border: none !important; box-shadow: 0 2px 8px rgba(0,0,0,0.06) !important; }
        .leaflet-control-zoom a {
            background: #fff !important;
            color: #3a8a72 !important;
            border-radius: 10px !important;
            margin: 4px !important;
            width: 32px !important;
            height: 32px !important;
            line-height: 32px !important;
            font-weight: 600 !important;
            border: 1px solid rgba(184,224,210,0.3) !important;
        }
        .leaflet-control-zoom a:hover { background: #e8f5f0 !important; color: #1a5a42 !important; }
        .leaflet-control-scale { background: rgba(255,255,255,0.8); border-radius: 16px; padding: 1px 10px; font-size: 9px; color: #3a6b5a; border: 1px solid rgba(184,224,210,0.2); }

        @media (max-width: 768px) {
            .sidebar { width: 280px; min-width: 220px; }
            .sidebar-header h1 { font-size: 1.2rem; }
            .object-title { font-size: 0.8rem; }
            .object-icon { width: 32px; height: 32px; font-size: 14px; }
            .custom-popup .leaflet-popup-content { width: 220px !important; }
        }
        @media (max-width: 500px) {
            .sidebar { width: 240px; min-width: 180px; }
            .sidebar-header { padding: 1rem; }
            .sidebar-header h1 { font-size: 1rem; }
            .objects-list { padding: 0.6rem 0.8rem; }
            .object-card { padding: 6px 10px; gap: 8px; }
            .object-title { font-size: 0.7rem; }
            .object-icon { width: 28px; height: 28px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>🌿 Креативный Дагестан</h1>
            <div class="sub"><span>✦ 18 объектов</span> · нажми на название — карта покажет место</div>
        </div>
        <div class="objects-list" id="objectsList"></div>
    </aside>
    <div class="map-container">
        <div id="map"></div>
    </div>
</div>

<script>
const objectsData = [
    { id:1, name:"Кубачи — ювелирное искусство", lat:42.0925, lng:47.6000, category:"Народный промысел", address:"с. Кубачи, Дахадаевский район", image:"images/kubachi.jpg", color:"#4a9e7a" },
    { id:2, name:"Унцукуль — насечка по дереву", lat:42.7122, lng:46.7897, category:"Народный промысел", address:"с. Унцукуль", image:"images/untsukul.jpg", color:"#5aaa90" },
    { id:3, name:"Балхарская керамика", lat:42.3100, lng:47.1689, category:"Народный промысел", address:"с. Балхар, Акушинский район", image:"images/balhar.jpg", color:"#7dc6b0" },
    { id:4, name:"Гоцатль — художественный металл", lat:42.5333, lng:46.8667, category:"Народный промысел", address:"с. Гоцатль, Хунзахский район", image:"images/gotsatl.jpg", color:"#6a9a80" },
    { id:5, name:"Табасаранские ковры", lat:41.9833, lng:48.0000, category:"Ковроткачество", address:"Табасаранский район", image:"images/tabasarancarpet.jpg", color:"#8ab8a0" },
    { id:6, name:"Дербент — крепость и ремесла", lat:42.0575, lng:48.2873, category:"Культурное наследие", address:"г. Дербент, цитадель Нарын-Кала", image:"images/derbent.jpg", color:"#9ab87a" },
    { id:7, name:"Музей изобразительных искусств", lat:42.9849, lng:47.5049, category:"Музей / Галерея", address:"г. Махачкала, ул. Гамзатова, 21", image:"images/mahachkala-museum.jpg", color:"#d4a08a" },
    { id:8, name:"Галерея «Ковчег»", lat:42.9792, lng:47.4987, category:"Современное искусство", address:"г. Махачкала, пр. Гамидова, 12", image:"images/kovcheg.jpg", color:"#c0806a" },
    { id:9, name:"Арт-пространство «Артдвор»", lat:42.9765, lng:47.5023, category:"Креативный кластер", address:"г. Махачкала, ул. Ярагского, 45", image:"images/artdvor.jpg", color:"#5bb8b0" },
    { id:10, name:"Ансамбль «Лезгинка»", lat:42.9812, lng:47.5040, category:"Музыка / Танец", address:"г. Махачкала, пр. Ленина, 1", image:"images/lezginka.jpg", color:"#b8a8d4" },
    { id:11, name:"Дагестанская филармония", lat:42.9830, lng:47.5075, category:"Концертный зал", address:"г. Махачкала, ул. Дахадаева, 3", image:"images/philharmonia.jpg", color:"#9a8ab8" },
    { id:12, name:"Фестиваль «Дербентская крепость»", lat:42.0590, lng:48.2885, category:"Фестиваль", address:"г. Дербент, цитадель", image:"images/derbent-fest.jpg", color:"#d4a08a" },
    { id:13, name:"Дизайн-студии Махачкалы", lat:42.9835, lng:47.4960, category:"Дизайн / Медиа", address:"г. Махачкала, пр. Гамзатова", image:"images/design-studio.jpg", color:"#5bb8b0" },
    { id:14, name:"Каспийск — арт-проекты", lat:42.8817, lng:47.6392, category:"Современное искусство", address:"г. Каспийск, набережная", image:"images/kaspiysk.jpg", color:"#7dc6b0" },
    { id:15, name:"Хасавюрт — культурный центр", lat:43.2500, lng:46.5833, category:"Городской досуг", address:"г. Хасавюрт", image:"images/khasavyurt.jpg", color:"#8ab8a0" },
    { id:16, name:"Буйнакск — творческие объединения", lat:42.8167, lng:47.1167, category:"Культура", address:"г. Буйнакск", image:"images/buinaksk.jpg", color:"#6a9a80" },
    { id:17, name:"Кизляр — народные промыслы", lat:43.8467, lng:46.7125, category:"Культурное наследие", address:"г. Кизляр", image:"images/kizlyar.jpg", color:"#5aaa90" },
    { id:18, name:"Дагестанское книжное издательство", lat:42.9801, lng:47.5002, category:"Издательство", address:"г. Махачкала", image:"images/book-publishing.jpg", color:"#4a9e7a" }
];

// КАРТА — ТОЛЬКО ДАГЕСТАН
const map = L.map('map', {
    center: [42.5, 47.3],
    zoom: 8,
    minZoom: 7,
    maxZoom: 12,
    zoomControl: true
});

// ЖЁСТКИЕ ГРАНИЦЫ ДАГЕСТАНА
const dagestanBounds = [[40.8, 45.0], [44.8, 50.0]];
map.setMaxBounds(dagestanBounds);
map.on('drag', function() { map.panInsideBounds(dagestanBounds, { animate: true }); });
map.on('zoomend', function() { if (map.getZoom() < 7) map.setZoom(7); });

// ПРИЯТНАЯ ПОДЛОЖКА
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CartoDB',
    subdomains: 'abcd',
    maxZoom: 18,
    minZoom: 7
}).addTo(map);

// КАПЛЯ С ОСТРЫМ КОНЧИКОМ (SVG)
function createDropIcon(color) {
    return L.divIcon({
        html: `
            <svg width="30" height="42" viewBox="0 0 30 42" style="display:block;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.2));">
                <path d="M15 0 C15 0, 30 22, 30 30 C30 38.4, 23.4 42, 15 42 C6.6 42, 0 38.4, 0 30 C0 22, 15 0, 15 0 Z" 
                      fill="${color}" stroke="white" stroke-width="1.5"/>
                <circle cx="15" cy="27" r="3" fill="white" opacity="0.3"/>
            </svg>
        `,
        iconSize: [30, 42],
        popupAnchor: [0, -22],
        className: 'drop-marker'
    });
}

// ДОБАВЛЯЕМ МАРКЕРЫ
const markersMap = new Map();
objectsData.forEach(obj => {
    const marker = L.marker([obj.lat, obj.lng], { icon: createDropIcon(obj.color) }).addTo(map);
    const popupHtml = `
        <div>
            <img class="popup-img" src="${obj.image}" alt="${obj.name}" onerror="this.src='https://placehold.co/600x400/eaf5f0/3a7a62?text=Фото'">
            <div class="popup-text">
                <h3>${obj.name}</h3>
                <div class="popup-address">📍 ${obj.address}</div>
                <span class="popup-badge">${obj.category}</span>
            </div>
        </div>
    `;
    marker.bindPopup(popupHtml, { className: 'custom-popup', maxWidth: 300 });
    markersMap.set(obj.id, { marker, data: obj });
});

// СПИСОК
const container = document.getElementById('objectsList');
const symbols = { "Народный промысел":"✦", "Ковроткачество":"◈", "Культурное наследие":"◈", "Музей / Галерея":"◈", "Современное искусство":"◈", "Креативный кластер":"◈", "Музыка / Танец":"♪", "Концертный зал":"♪", "Фестиваль":"✦", "Дизайн / Медиа":"◇", "Городской досуг":"◇", "Культура":"◇", "Издательство":"◇" };

objectsData.forEach(obj => {
    const card = document.createElement('div');
    card.className = 'object-card';
    const sym = symbols[obj.category] || "•";
    card.innerHTML = `
        <div class="object-icon" style="background:${obj.color}22; border:1px solid ${obj.color}44; color:${obj.color};">${sym}</div>
        <div class="object-info">
            <div class="object-title">${obj.name}</div>
            <div class="object-category">${obj.category}</div>
        </div>
    `;
    card.addEventListener('click', () => {
        const { marker, data } = markersMap.get(obj.id);
        map.flyTo([data.lat, data.lng], 12, { duration: 1.0 });
        setTimeout(() => marker.openPopup(), 1100);
    });
    container.appendChild(card);
});

L.control.scale({ metric: true, imperial: false, position: 'bottomright' }).addTo(map);
setTimeout(() => map.invalidateSize(), 300);
window.addEventListener('resize', () => setTimeout(() => map.invalidateSize(), 200));
</script>
</body>
</html>
