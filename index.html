  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f9f7;
      height: 100vh;
      overflow: hidden;
      color: #1a3a2e;
    }
    #map { height: 100vh; width: 100vw; background: #f5f9f7; }
    /* Стили панели */
    .panel {
      position: absolute;
      top: 0; left: 0;
      width: 400px;
      height: 100%;
      background: #ffffff;
      box-shadow: 4px 0 20px rgba(0,0,0,0.06);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
      transition: transform 0.3s ease;
      border-right: 1px solid rgba(184, 224, 210, 0.3);
    }
    .panel-header {
      background: linear-gradient(145deg, #e8f5f0 0%, #d4ede4 100%);
      padding: 20px 22px 16px 22px;
      border-bottom: 1px solid rgba(184, 224, 210, 0.3);
      flex-shrink: 0;
    }
    .panel-header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .mountain-icon {
      width: 32px; height: 32px;
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a3a2e;
      letter-spacing: -0.3px;
    }
    .panel-sub {
      font-size: 0.75rem;
      color: #3a6b5a;
      font-weight: 400;
      margin-top: 2px;
      padding-left: 42px;
      letter-spacing: 0.2px;
    }
    .panel-sub span {
      background: #eaf5f0;
      padding: 2px 10px;
      border-radius: 30px;
      color: #5a8a78;
      font-weight: 500;
      margin-left: 4px;
    }
    .filter-wrap {
      padding: 14px 22px 10px 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-bottom: 1px solid rgba(184, 224, 210, 0.25);
      flex-shrink: 0;
      background: #ffffff;
    }
    .filter-btn {
      background: white;
      border: 1.5px solid #b8e0d2;
      color: #3a6b5a;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.2px;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }
    .filter-btn.active {
      background: #1a3a2e;
      border-color: #1a3a2e;
      color: white;
    }
    .filter-btn:hover { transform: scale(0.96); opacity: 0.8; }
    .card-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 20px 16px;
      background: #ffffff;
    }
    .card-list::-webkit-scrollbar { width: 4px; }
    .card-list::-webkit-scrollbar-track { background: #eaf5f0; border-radius: 10px; }
    .card-list::-webkit-scrollbar-thumb { background: #7dc6b0; border-radius: 10px; }

    .card-item {
      background: white;
      border-radius: 16px;
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02), 0 1px 3px rgba(0,0,0,0.03);
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid transparent;
      transition: all 0.25s ease;
      cursor: pointer;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.35s ease forwards;
    }
    .card-item:hover {
      border-left: 4px solid #7dc6b0;
      transform: translateX(4px) scale(1.01);
      box-shadow: 0 8px 18px rgba(0,0,0,0.04);
      background: #fafdfb;
    }
    .card-icon {
      width: 42px; height: 42px;
      flex-shrink: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: white;
      font-weight: 600;
      font-family: Georgia, serif;
      background: #7dc6b0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #1a3a2e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-badge {
      display: inline-block;
      background: #eaf5f0;
      color: #5a8a78;
      font-size: 0.6rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 30px;
      margin-top: 3px;
      letter-spacing: 0.2px;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    /* кастомный попап */
    .custom-popup .leaflet-popup-content-wrapper {
      border-radius: 20px;
      background: white;
      box-shadow: 0 16px 40px rgba(0,0,0,0.08);
      padding: 0;
      overflow: hidden;
    }
    .custom-popup .leaflet-popup-content {
      margin: 0;
      width: 280px;
      font-family: 'Inter', sans-serif;
    }
    .popup-content {
      padding: 14px 16px 16px;
    }
    .popup-photo-grid {
      display: grid;
      gap: 4px;
      margin-bottom: 10px;
    }
    .popup-photo-grid.one-col { grid-template-columns: 1fr; }
    .popup-photo-grid.two-col { grid-template-columns: 1fr 1fr; }
    .popup-photo {
      height: 160px;
      object-fit: cover;
      width: 100%;
      background: #f0f5f2;
      border-radius: 8px;
    }
    .popup-title {
      font-weight: 700;
      font-size: 1rem;
      color: #1a3a2e;
      margin-bottom: 4px;
    }
    .popup-address {
      font-size: 0.75rem;
      color: #5a8a78;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 6px;
    }
    .popup-cat {
      background: #eaf5f0;
      color: #3a6b5a;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 12px;
      border-radius: 30px;
      display: inline-block;
      margin-bottom: 6px;
    }
    .popup-desc {
      font-size: 0.8rem;
      color: #1a3a2e;
      opacity: 0.75;
      line-height: 1.4;
    }
    .leaflet-popup-tip { background: white; }

    /* Загрузочный экран */
    #loader {
      position: fixed;
      inset: 0;
      background: #f5f9f7;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    #loader.hidden { opacity: 0; }
    .loader-mountain {
      width: 70px; height: 70px;
      opacity: 0.6;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(0.98); }
      50% { opacity: 1; transform: scale(1.02); }
      100% { opacity: 0.5; transform: scale(0.98); }
    }
    .loader-text {
      margin-top: 20px;
      font-weight: 500;
      color: #3a6b5a;
      letter-spacing: 0.5px;
      font-size: 0.9rem;
    }

    /* адаптив */
    @media (max-width: 768px) {
      .panel { width: 320px; }
      .panel-title { font-size: 1.3rem; }
      .panel-sub { font-size: 0.7rem; padding-left: 38px; }
      .card-icon { width: 36px; height: 36px; font-size: 17px; }
      .card-name { font-size: 0.8rem; }
      .popup-content { width: 260px; }
      .popup-photo { height: 130px; }
    }
    @media (max-width: 500px) {
      .panel {
        width: 100%;
        height: 45vh;
        top: auto;
        bottom: 0;
        border-right: none;
        border-top: 1px solid rgba(184,224,210,0.3);
        box-shadow: 0 -6px 20px rgba(0,0,0,0.04);
        transform: translateY(0);
      }
      #map { height: 55vh; }
      .panel-header { padding: 14px 18px 10px; }
      .panel-title { font-size: 1.1rem; }
      .panel-sub { font-size: 0.65rem; padding-left: 34px; }
      .filter-wrap { padding: 8px 14px; gap: 5px; }
      .filter-btn { font-size: 0.6rem; padding: 3px 10px; }
      .card-item { padding: 8px 10px; gap: 10px; }
      .card-icon { width: 32px; height: 32px; font-size: 14px; }
      .card-name { font-size: 0.75rem; }
      .card-badge { font-size: 0.55rem; }
      .popup-content { width: 240px; }
      .popup-photo { height: 110px; }
      .popup-title { font-size: 0.9rem; }
    }
  </style>
</head>

      // ---------- КАРТА ----------
      const map = L.map('map', { 
        center: [42.5, 47.3], 
        zoom: 8,
        minZoom: 7,
        maxZoom: 13,
        zoomControl: true,
        fadeAnimation: true,
      });
      const dagestanBounds = [[40.8, 45.0], [44.8, 50.0]];
      map.setMaxBounds(dagestanBounds);
      map.on('drag', function() { map.panInsideBounds(dagestanBounds, { animate: true }); });
      map.on('zoomend', function() { if (map.getZoom() < 7) map.setZoom(7); if (map.getZoom() > 13) map.setZoom(13); });

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CartoDB',
        subdomains: 'abcd',
        maxZoom: 18,
        minZoom: 7
      }).addTo(map);

      // ---------- КАПЛИ (маркеры) ----------
      function createDropIcon(color, symbol) {
        const svg = `
          <svg width="36" height="50" viewBox="0 0 36 50" xmlns="http://www.w3.org/2000/svg">
            <defs><filter id="shadow" x="-10%" y="-10%" width="130%" height="130%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15"/></filter></defs>
            <path d="M18 2 C18 2, 34 24, 34 32 C34 40.8, 26.8 46, 18 46 C9.2 46, 2 40.8, 2 32 C2 24, 18 2, 18 2 Z" 
                  fill="${color}" stroke="white" stroke-width="2" filter="url(#shadow)"/>
            <ellipse cx="18" cy="32" rx="12" ry="10" fill="rgba(255,255,255,0.12)"/>
            <circle cx="12" cy="26" r="2.5" fill="white" opacity="0.35"/>
            <circle cx="9" cy="22" r="1.2" fill="white" opacity="0.2"/>
            <text x="18" y="34" text-anchor="middle" fill="white" font-size="15" font-weight="600" font-family="Georgia, serif">${symbol}</text>
          </svg>
        `;
        return L.divIcon({
          html: svg,
          className: 'custom-drop-icon',
          iconSize: [36, 50],
          iconAnchor: [18, 46],
          popupAnchor: [0, -46],
        });
      }

      const markers = [];
      data.forEach(item => {
        const color = COLOR_MAP[item.cat] || '#7dc6b0';
        const symbol = SYMBOL_MAP[item.cat] || '✦';
        const icon = createDropIcon(color, symbol);
        const marker = L.marker([item.lat, item.lng], { icon, riseOnHover: true })
          .bindPopup(createPopupContent(item), { className: 'custom-popup', maxWidth: 300 });
        marker.on('mouseover', function(e) { this._icon.style.transform = 'scale(1.12)'; this._icon.style.filter = 'drop-shadow(0 8px 12px rgba(0,0,0,0.15))'; });
        marker.on('mouseout', function(e) { this._icon.style.transform = 'scale(1)'; this._icon.style.filter = ''; });
        marker.addTo(map);
        markers.push(marker);
      });

      function createPopupContent(item) {
        const color = COLOR_MAP[item.cat] || '#7dc6b0';
        const photos = item.photos && item.photos.length ? item.photos : [];
        const gridClass = photos.length === 2 ? 'two-col' : 'one-col';
        let photoHtml = '';
        if (photos.length) {
          photoHtml = `<div class="popup-photo-grid ${gridClass}">`;
          photos.forEach(url => {
            photoHtml += `<img class="popup-photo" src="${url}" alt="фото" onerror="this.style.display='none'" />`;
          });
          photoHtml += `</div>`;
        }
        return `
          <div class="popup-content">
            ${photoHtml}
            <div class="popup-title">${item.name}</div>
            <div class="popup-address"><span>📍</span> ${item.addr}</div>
            <span class="popup-cat" style="background:${color}20; color:${color};">${item.cat}</span>
            <div class="popup-desc">${item.desc || ''}</div>
          </div>
        `;
      }

      // ---------- ПАНЕЛЬ (фильтры + карточки) ----------
      const filterWrap = document.getElementById('filterWrap');
      const cardList = document.getElementById('cardList');
      let activeFilter = 'Все';

      function renderFilters() {
        const cats = ['Все', ...new Set(data.map(d => d.cat))];
        filterWrap.innerHTML = '';
        cats.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn' + (cat === activeFilter ? ' active' : '');
          btn.textContent = cat;
          btn.dataset.cat = cat;
          btn.addEventListener('click', () => {
            activeFilter = cat;
            renderFilters();
            renderCards();
          });
          filterWrap.appendChild(btn);
        });
      }

      function renderCards() {
        const filtered = activeFilter === 'Все' ? data : data.filter(d => d.cat === activeFilter);
        cardList.innerHTML = '';
        filtered.forEach((item, idx) => {
          const color = COLOR_MAP[item.cat] || '#7dc6b0';
          const symbol = SYMBOL_MAP[item.cat] || '✦';
          const div = document.createElement('div');
          div.className = 'card-item';
          div.style.animationDelay = (0.02 + idx * 0.02) + 's';
          div.innerHTML = `
            <div class="card-icon" style="background:${color};">${symbol}</div>
            <div class="card-info">
              <div class="card-name">${item.short}</div>
              <div class="card-badge">${item.cat}</div>
            </div>
          `;
          div.addEventListener('click', () => {
            const marker = markers.find((m, i) => data[i].id === item.id);
            if (marker) {
              map.flyTo([item.lat, item.lng], 12, { duration: 1.2, easeLinearity: 0.35 });
              setTimeout(() => marker.openPopup(), 200);
            }
          });
          cardList.appendChild(div);
        });
        document.getElementById('objectCount').textContent = filtered.length;
      }

      renderFilters();
      renderCards();

      // ---------- ЗАГРУЗОЧНЫЙ ЭКРАН ----------
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
      }, 1200);

      // ---------- ПОДГОНКА ПАНЕЛИ ПРИ РЕСАЙЗЕ ----------
      window.addEventListener('resize', () => {
        // адаптив уже через CSS
      });
    })();
  </script>
</body>
</html>
